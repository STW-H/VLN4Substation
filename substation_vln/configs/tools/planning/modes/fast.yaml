# Prefer short routes and fewer expanded nodes; hard collision constraints remain unchanged.
movement_mode: fast

cost_map:
  base_cost: 1.0
  preferred_road_cost: 0.75
  preferred_path_sigma_m: 1.0
  preferred_path_alpha: 0.15
  narrow_space_penalty: 0.75
  obstacle_repulsion_radius_m: 1.0
  obstacle_repulsion_weight: 1.0
  min_cost: 0.20

hierarchical:
  corridor_radius_m: 1.5
  max_corridor_radius_m: 6.0

astar:
  cost_weight: 0.65
  heuristic_weight: 1.35
  rotation_cost_per_bin: 0.25
  lateral_motion_weight: 0.15
  preferred_path_direction_reward: 0.10
  preferred_path_reverse_penalty: 0.10
  path_turn_cost_weight: 0.50
  max_path_turn_deg: 89.0
  tilt_cost_weight: 8.0
  min_traversal_cost: 0.000001
  allow_diagonal: true

waypoint:
  tolerance_m: 0.6
  terminal_distance_weight: 0.5
