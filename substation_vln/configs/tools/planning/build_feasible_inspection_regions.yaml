# Defaults for tools/planning/build_feasible_inspection_regions.py

paths:
  pointcloud: substation_vln/data/processed/220kv_erfeishan/pointcloud/erfeishan_0.02_resampled_real_coords_axis_corrected.ply
  targets: substation_vln/outputs/220kv_erfeishan/annotation/annotations_merged.json
  planning_map: substation_vln/outputs/220kv_erfeishan/planning/maps/planning_map.npz
  planning_metadata: substation_vln/outputs/220kv_erfeishan/planning/maps/planning_map_metadata.json
  output_dir: substation_vln/outputs/220kv_erfeishan/planning/inspection_regions
  voxel_cache: substation_vln/outputs/220kv_erfeishan/planning/inspection_regions/cache/pointcloud_voxels_0p10m.npz

voxel:
  voxel_size_m: 0.10
  chunk_size: 2000000
  rebuild_cache: false

visibility:
  ground_z_m: 0.0
  camera_height_m: 1.0
  visibility_clearance_radius_m: 0.2
  camera_exclusion_radius_m: 0.3
  min_region_area_m2: 0.5
  morphology_open_radius_m: 0.0

# Empty means all targets. Alternatively list IDs, e.g. [target_001].
target_ids: []
