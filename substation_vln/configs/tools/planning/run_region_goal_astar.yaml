# Region-goal pose-aware A* configuration.

paths:
  planning_map: substation_vln/outputs/220kv_erfeishan/planning/maps/planning_map.npz
  planning_metadata: substation_vln/outputs/220kv_erfeishan/planning/maps/planning_map_metadata.json
  ortho_image: substation_vln/data/processed/220kv_erfeishan/orthophoto/axis_corrected_pointcloud_ortho_8k.png
  ortho_metadata: substation_vln/data/processed/220kv_erfeishan/orthophoto/axis_corrected_pointcloud_ortho_8k.json
  ortho_thumbnail_2k: substation_vln/data/processed/220kv_erfeishan/orthophoto/axis_corrected_pointcloud_ortho_2k.png
  goal_regions: substation_vln/outputs/220kv_erfeishan/planning/inspection_goal_regions/inspection_goal_regions.npz
  goal_regions_metadata: substation_vln/outputs/220kv_erfeishan/planning/inspection_goal_regions/inspection_goal_regions_metadata.json
  output_dir: substation_vln/outputs/220kv_erfeishan/planning/region_goal_astar

start:
  yaw_deg: 0.0

hierarchical:
  corridor_radius_m: 2.0
  max_corridor_radius_m: 8.0

astar:
  cost_weight: 1.0
  heuristic_weight: 1.0
  rotation_cost_per_bin: 0.35
  lateral_motion_weight: 0.25
  # Metre-equivalent terminal penalty; per-device tilt limits come from region metadata.
  tilt_cost_weight: 15.0
  min_traversal_cost: 0.000001
  allow_diagonal: true

display:
  window_name: Region-goal A* start pose
  max_window_width: 1400
  max_window_height: 1000
  path_line_width: 3
  goal_marker_radius_px: 1
  ortho_max_resolution: 2048
  target_overlay_alpha: 0.65
  goal_overlay_alpha: 0.80
